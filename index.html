<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAH GTA Style</title>

<!-- QR CODE LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; color:white; }

/* START */
#mainPage, #homePage {
  display:flex; justify-content:center; align-items:center;
  height:100vh;
  flex-direction: column;
}
#mainPage { background:#141e30; }
#homePage { display:none; background:url('https://images6.alphacoders.com/555/555100.jpg') center/cover; }

.logo {
  font-size:5em;
  background:linear-gradient(45deg,#00f2fe,#4facfe,#43e97b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

button {
  padding:15px 30px;
  margin-top:20px;
  font-size:18px;
  cursor:pointer;
}

/* QR */
#qrcode {
  margin:20px;
}

/* GAME */
#gameScreen {
  display:none;
  background:#222;
  height:100vh;
  position:relative;
}

/* PLAYER */
#player {
  width:50px;
  height:50px;
  background:url('https://i.imgur.com/6X4ZQZQ.png') center/cover;
  position:absolute;
}

/* BULLETS */
.bullet {
  width:8px;
  height:8px;
  background:yellow;
  position:absolute;
  border-radius:50%;
}

/* HUD */
#hud {
  position:absolute;
  top:10px;
  left:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="mainPage">
  <div class="logo">PAH</div>

  <p>Scan to play on phone 📱</p>
  <div id="qrcode"></div>

  <button onclick="enter()">Enter</button>
</div>

<!-- MENU -->
<div id="homePage">
  <h1>PAH V</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div id="player"></div>
  <div id="hud">WASD = move | Click = shoot</div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("gameScreen");

let pos = { x: 300, y: 300 };
let speed = 4;
let keys = {};

// ENTER
function enter() {
  document.getElementById("mainPage").style.display="none";
  document.getElementById("homePage").style.display="flex";
}

// START GAME
function startGame() {
  document.getElementById("homePage").style.display="none";
  game.style.display="block";
  player.style.left = pos.x+"px";
  player.style.top = pos.y+"px";
}

// MOVE
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function update() {
  if(keys["w"]) pos.y -= speed;
  if(keys["s"]) pos.y += speed;
  if(keys["a"]) pos.x -= speed;
  if(keys["d"]) pos.x += speed;

  player.style.left = pos.x+"px";
  player.style.top = pos.y+"px";

  requestAnimationFrame(update);
}
update();

// SHOOT
document.addEventListener("click", e => {
  if(game.style.display === "none") return;

  let bullet = document.createElement("div");
  bullet.className = "bullet";

  let bx = pos.x + 20;
  let by = pos.y + 20;

  bullet.style.left = bx+"px";
  bullet.style.top = by+"px";
  game.appendChild(bullet);

  let dx = e.clientX - bx;
  let dy = e.clientY - by;
  let dist = Math.sqrt(dx*dx+dy*dy);

  dx/=dist; dy/=dist;

  function moveBullet() {
    bx += dx*10;
    by += dy*10;

    bullet.style.left = bx+"px";
    bullet.style.top = by+"px";

    if(bx<0||by<0||bx>window.innerWidth||by>window.innerHeight){
      bullet.remove();
      return;
    }

    requestAnimationFrame(moveBullet);
  }

  moveBullet();
});

// QR CODE (uses your live site link)
new QRCode(document.getElementById("qrcode"), {
  text: window.location.href,
  width: 150,
  height: 150
});
</script>

</body>
</html>
