<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAH GTA Menu</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* START SCREEN */
.screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #141e30, #243b55);
}

/* LOGO */
.logo {
  font-size: 6em;
  font-weight: 900;
  letter-spacing: 10px;
  background: linear-gradient(45deg, #00f2fe, #4facfe, #43e97b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARD */
.card {
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #333;
  cursor: pointer;
}

/* GTA MENU */
#homePage {
  display: none;
  height: 100vh;
  background: url('https://images6.alphacoders.com/555/555100.jpg') no-repeat center center/cover;
  position: relative;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.menu {
  position: absolute;
  top: 30%;
  left: 10%;
}

.menu button {
  display: block;
  margin: 10px 0;
  padding: 15px 30px;
  font-size: 18px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: 2px solid white;
}

/* GAME SCREEN */
#gameScreen {
  display: none;
  height: 100vh;
  background: #111;
  position: relative;
}

#player {
  width: 50px;
  height: 50px;
  background: red;
  position: absolute;
  top: 50%;
  left: 50%;
}
</style>
</head>

<body>

<!-- START -->
<div id="mainPage" class="screen">
  <div class="card">
    <div class="logo">PAH</div>
    <button onclick="enterSite()">Enter</button>
  </div>
</div>

<!-- MENU -->
<div id="homePage">
  <div class="overlay"></div>

  <div class="menu">
    <h1>PAH V</h1>
    <button onclick="startGame()">Start Game</button>
    <button onclick="goBack()">Exit</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div id="player"></div>
  <p style="position:absolute; top:10px; left:10px;">
    Use WASD to move
  </p>
</div>

<script>
function enterSite() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";
}

function goBack() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("mainPage").style.display = "flex";
}

function startGame() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
}

let player = { x: window.innerWidth/2, y: window.innerHeight/2 };
let speed = 5;

document.addEventListener("keydown", function(e) {
  if (document.getElementById("gameScreen").style.display === "none") return;

  if (e.key === "w") player.y -= speed;
  if (e.key === "s") player.y += speed;
  if (e.key === "a") player.x -= speed;
  if (e.key === "d") player.x += speed;

  let p = document.getElementById("player");
  p.style.top = player.y + "px";
  p.style.left = player.x + "px";
});
</script>

</body>
</html>
